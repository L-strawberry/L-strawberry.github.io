        :root {
            /* 背景色：深海蓝黑渐变 */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            /* 卡片背景：半透明深蓝 */
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            
            /* 主色调：极光绿/青色 */
            --primary: #00d1b2; 
            --primary-hover: #00b89c;
            
            /* 文本颜色 */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            /* 状态颜色 */
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            
            /* 装饰效果 */
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --glow: 0 0 15px rgba(0, 209, 178, 0.25);
            
            --header-height: 80px;
            --footer-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* PC端默认禁止body滚动，由内部容器滚动 */
        }

        /* ====================
           自定义滚动条
           ==================== */
        ::-webkit-scrollbar {
            width: 8px;    /* 使用固定像素而不是 auto */
            height: 8px;   /* 使用固定像素而不是 auto */
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 209, 178, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 209, 178, 0.5);
        }

        /* 头部区域 */
        .header {
            height: var(--header-height);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            background: rgba(26, 26, 46, 0.9);
            z-index: 100;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            background: var(--primary); /* 现在会自动变为极光绿 */
            /* 添加一点渐变感 */
            background: linear-gradient(135deg, #00d1b2 0%, #00a8cc 100%);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--glow);
        }        

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .version-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a; /* 深色文字在亮青色背景下更清晰 */
            box-shadow: 0 4px 12px rgba(0, 209, 178, 0.2);
        }

        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-secondary:active { transform: scale(0.98); }

        /* 主内容区域 - PC端布局 */
        .main {
            flex: 1;
            display: flex;
            padding: 1.5rem 2rem;
            gap: 1.5rem;
            overflow: hidden; /* 内部卡片滚动 */
            max-width: 1920px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            height: 100%; /* PC端占满高度 */
        }

        .card-header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 600;
            font-size: 1rem;
        }

        .card-icon {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .editor {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            padding: 1.5rem;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', Consolas, monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .editor::placeholder { color: rgba(255, 255, 255, 0.2); }

        .status-indicator {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            font-size: 0.75rem;
            color: var(--text-secondary);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-dot.error { background: var(--error); box-shadow: 0 0 8px var(--error); }

        /* 底部状态栏 */
        .footer {
            height: var(--footer-height);
            padding: 0 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .stats { display: flex; gap: 2rem; }
        .stat-item { color: var(--text-secondary); display: flex; gap: 0.5rem; align-items: center; }
        .stat-value { color: #fff; font-weight: 600; font-family: monospace; }
        .hint { color: var(--text-secondary); opacity: 0.7; }

        /* ====================
           移动端专属样式
           ==================== */
    @media (max-width: 1024px) {
        /* 1. 实现您要求的标题间距：在第一行配置项上方留出空隙 */
        .config-row {
            margin-top: 25px !important; /* 与 sing-box 标题留出约两个空格的距离 */
        }

        /* 2. 缩小输入框内边距，防止并排时太拥挤 */
        #ruleInput, #templateSelect {
            padding: 8px 5px !important;
            font-size: 12px !important;
        }

        /* 3. 底部提示单行显示优化 */
        .footer {
            flex-direction: column;
            padding: 8px;
            gap: 4px;
        }

        .hint {
            display: block !important;
            white-space: nowrap;      /* 强制单行 */
            font-size: 11px;
            width: 100%;
            text-align: center;
            overflow-x: auto;
            opacity: 0.8;
        }

        .stats {
            width: 100%;
            justify-content: center;
            font-size: 11px;
            gap: 10px;
        }

</head>
<body>

    <div class="header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-exchange-alt"></i></div>
            <div class="logo-text">sing-box</div>
        </div>
    </div>

    <div class="config-row" style="display: flex; gap: 10px; margin-bottom: 15px; margin-top: 20px;">
        <div class="input-group" style="flex: 1;">
            <label style="color: var(--text-secondary); font-size: 13px; white-space: nowrap;">节点规则：🕳ℹ️<策略组名称1>ℹ️🏷<节点筛选正则1></label>
            <input type="text" id="ruleInput" placeholder="默认: 🕳ℹ️PROXY...🏷..." 
                  style="width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); color: white; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 13px;">
        </div>

        <div class="input-group" style="flex: 1;">
            <label style="color: var(--text-secondary); font-size: 13px; white-space: nowrap;">配置模板</label>
            <select id="templateSelect" style="width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); color: white; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 13px;">
                <option value="default">sing-box</option>
                <option value="reF1nd">sing-box_reF1nd</option>
            </select>
        </div>
    </div>
        
        <div class="controls">
            <button class="btn btn-secondary" onclick="clearInput()">
                <i class="fas fa-trash-alt"></i> <span>清空</span>
            </button>
            <button class="btn btn-primary" onclick="convert()">
                <i class="fas fa-bolt"></i> <span>转换</span>
            </button>
            <button class="btn btn-secondary" onclick="copyResult()">
                <i class="fas fa-copy"></i> <span>复制</span>
            </button>
        </div>
    </div>

    <div class="main">
        <!-- 输入卡片 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon"><i class="fas fa-code"></i></div>
                    <div>输入</div>
                </div>
            </div>
            <div class="editor-container">
                <div class="status-indicator" id="inputStatus">
                    <div class="status-dot"></div>
                    <span>等待输入</span>
                </div>
                <textarea id="inputArea" class="editor" placeholder="粘贴节点内容...&#10;&#10;支持格式（节点间隔一行）：&#10;• 节点链接&#10;• 混合节点列表"></textarea>
            </div>
        </div>

        <!-- 输出卡片 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon"><i class="fas fa-cogs"></i></div>
                    <div>输出</div>
                </div>
            </div>
            <div class="editor-container">
                <div class="status-indicator" id="outputStatus">
                    <div class="status-dot"></div>
                    <span>等待结果</span>
                </div>
                <textarea id="outputArea" class="editor" readonly placeholder="转换后的配置..."></textarea>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="stats">
            <div class="stat-item">
                <i class="fas fa-server"></i>
                <span>节点: <span id="nodeCount" class="stat-value">0</span></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-clock"></i>
                <span>状态: <span id="statusText" class="stat-value">就绪</span></span>
            </div>
        </div>
        <div class="hint">
            <i class="fas fa-shield-alt"></i> 本地转换 · 保护隐私 · 核心 V1.13.0+
        </div>
    </div>

                        node.uuid = v.id;
                        node.security = v.scy || 'auto';
                        node.alter_id = v.aid ? parseInt(v.aid) : 0;
                        node.tag = v.ps || node.tag;
                        
                        if (v.net === 'ws') {
                            node.transport = {
                                type: 'ws',
                                path: v.path || '/',
                                headers: v.host ? { Host: v.host } : {}
                            };
                        }
                        if (v.tls === 'tls') {
                            node.tls = { enabled: true, server_name: v.sni || v.host || v.add };
                        }
                    } catch (e) {
                        console.error("Vmess Base64 解析失败", e);
                        return null;
                    }
                  
                } else if (protocol === 'hysteria2') {
                    node.type = 'hysteria2';
                    node.password = uriObj.username; // 提取 e3a5bb40...
                    node.tls = {
                        enabled: true,
                        server_name: params.sni || node.server,
                        insecure: params.insecure === '1'
                    };
                } else if (protocol === 'trojan') {
                    node.type = 'trojan';
                    node.password = uriObj.username;
                    node.tls = {
                        enabled: true,
                        server_name: params.sni || params.peer || node.server,
                        utls: { enabled: true, fingerprint: 'chrome' }
                    };

                    const type = params.type || params.obfs;
                    const pluginStr = params.plugin || "";
                    
                    if (type === 'ws' || type === 'websocket') {
                        applyWs(node, params.path, params.host ? {Host: params.host} : {});
                    } else if (pluginStr.includes('obfs-local') && pluginStr.includes('websocket')) {
                        const pParts = pluginStr.split(';');
                        let wsPath = '/', wsHost = '';
                        pParts.forEach(p => {
                             if(p.includes('obfs-uri')) wsPath = p.split('=')[1];
                             if(p.includes('obfs-host')) wsHost = p.split('=')[1];
                        });
                        applyWs(node, wsPath, wsHost ? {Host: wsHost} : {});
                    }

                } else if (protocol === 'ss') {
                    let userInfo = uriObj.username;
                    if (!userInfo.includes(':')) {
                        const decoded = safeBase64Decode(userInfo);
                        if (decoded.includes(':')) userInfo = decoded;
                    }
                    let [method, password] = userInfo.split(':');
                    if (userInfo.includes('@')) {
                         const parts = userInfo.split('@');
                         const creds = parts[0].split(':');
                         method = creds[0];
                         password = creds[1];
                    }

                    node.type = 'shadowsocks';
                    node.method = method;
                    node.password = password;

                    const pluginStr = params.plugin || params['v2ray-plugin'] || "";
                    
                    if (pluginStr.includes('v2ray-plugin') || pluginStr.includes('obfs')) {
                         let opts = {};
                         if (!pluginStr.startsWith('{')) {
                             const parts = pluginStr.split(';');
                             parts.forEach(part => {
                                 const [k, v] = part.split('=');
                                 if(k) opts[k] = v || true;
                             });
                         }
                         
                         if (opts.mode === 'websocket' || opts.obfs === 'websocket') {
                             const host = opts.host || opts['obfs-host'];
                             applyWs(node, opts.path, host ? {Host: host} : {});
                             
                             if (opts.tls === true || opts.tls === 'true') {
                                 node.tls = {
                                     enabled: true,
                                     server_name: host || node.server
                                 };
                             }
                         }
                    }
                }
                return node.type ? node : null;
            } catch (e) { return null; }
        }

        // ==========================================
        // 5. 主转换逻辑
        // ==========================================
        function parseNodes(input) {
            let rawContent = input.trim();
            if (!rawContent.includes('://') && rawContent.length > 30) {
                try { rawContent = safeBase64Decode(rawContent); } catch (e) { console.error('Base64解码失败'); }
            }
            const parsedNodes = [];
            const lines = rawContent.split(/\n+/); // 仅按行拆分，保留 Tag 中的空格
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                try {
                    const node = parseURI(line);
                    if (node && node.server) parsedNodes.push(node);
                } catch (e) { console.warn('解析失败:', line); }
            });

            const finalNodes = [];
            const seenFingerprints = new Set();
            const tagCounter = {};
            parsedNodes.forEach(node => {
                const fingerprint = `${node.type}:${node.server}:${node.server_port}:${node.uuid || node.password || node.method}`;
                if (seenFingerprints.has(fingerprint)) return;
                seenFingerprints.add(fingerprint);

                let originalTag = node.tag.trim() || 'Node';
                if (tagCounter[originalTag] !== undefined) {
                    tagCounter[originalTag]++;
                    node.tag = `${originalTag} ${tagCounter[originalTag]}`;
                } else {
                    tagCounter[originalTag] = 0;
                    node.tag = originalTag;
                }
                finalNodes.push(node);
            });
            return finalNodes;
        }

        async function convert() {
            try {
                const input = document.getElementById('inputArea').value;
                const selectedKey = document.getElementById('templateSelect').value;
                const ruleString = document.getElementById('ruleInput').value || DEFAULT_RULE_STRING;

                const uniqueNodes = parseNodes(input);
                if (uniqueNodes.length === 0) {
                    setStatus('未识别到有效节点', 'error');
                    return;
                }

                let config = JSON.parse(JSON.stringify(TEMPLATES[selectedKey]));

                function createRegExp(pattern) {
                    // 默认开启忽略大小写 'i'，除非显式指定
                    const isCaseInsensitive = pattern.includes('ℹ️');
                    const cleanPattern = pattern.replace('ℹ️', '');
                    return new RegExp(cleanPattern, 'i'); // 强制 i 模式以提高匹配率
                }

                const outboundRules = ruleString.split('🕳').filter(i => i).map(i => {
                    let [outboundPattern, tagPattern = '.*'] = i.split('🏷');
                    return { 
                        outRegex: createRegExp(outboundPattern), 
                        tagRegex: createRegExp(tagPattern) 
                    };
                });

                config.outbounds.forEach(outbound => {
                    if (['selector', 'urltest'].includes(outbound.type)) {
                        if (!Array.isArray(outbound.outbounds)) outbound.outbounds = [];
                        
                        outboundRules.forEach(rule => {
                            // 检查当前策略组名是否符合规则
                            if (rule.outRegex.test(outbound.tag)) {
                                // 筛选匹配的节点
                                const matchedTags = uniqueNodes
                                    .filter(node => rule.tagRegex.test(node.tag))
                                    .map(node => node.tag);
                                
                                if (matchedTags.length > 0) {
                                    outbound.outbounds.push(...matchedTags);
                                }
                            }
                        });
                        // 去重
                        outbound.outbounds = [...new Set(outbound.outbounds)];
                    }
                });

                // 兜底
                config.outbounds.forEach(outbound => {
                    if (['selector', 'urltest'].includes(outbound.type) && outbound.outbounds.length === 0) {
                        outbound.outbounds.push("DIRECT");
                    }
                });

                config.outbounds.push(...uniqueNodes);

                document.getElementById('outputArea').value = JSON.stringify(config, null, 2);
                setStatus(`成功：${uniqueNodes.length} 个节点`, 'success');
            } catch (err) {
                setStatus(`出错: ${err.message}`, 'error');
            }
        }

        function clearInput() {
            document.getElementById('inputArea').value = '';
            document.getElementById('outputArea').value = '';
            setStatus('已清空', 'normal');
            document.getElementById('nodeCount').textContent = '0';
        }

        function copyResult() {
            const output = document.getElementById('outputArea');
            if (output.value) {
                output.select();
                document.execCommand('copy');
                setStatus('已复制到剪贴板', 'success');
            } else {
                setStatus('没有内容可复制', 'error');
            }
        }

        window.addEventListener('load', () => {
            setStatus('就绪', 'normal');
        });
    </script>
